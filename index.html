<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ҚМЖ Генераторы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .input-teal { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 0.95rem; }
        .input-teal:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="max-w-7xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-200 mt-4 mb-4">
        <header class="bg-gradient-to-r from-indigo-700 to-blue-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold flex items-center justify-center gap-3">
                <i data-lucide="target"></i> Толыққанды ҚМЖ Генераторы (НЗМ)
            </h1>
            <p class="text-blue-100 mt-2 font-medium">Үлгілі ашық сабақ • ОМ таратылған • ФС • Кестелік дизайн</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3">
            <!-- INPUT SIDE -->
            <div class="p-6 bg-white border-r border-gray-200 space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-xs font-bold uppercase">Бөлім</label><input id="section" class="input-teal"></div>
                    <div><label class="text-xs font-bold uppercase">Мектеп</label><input id="school" class="input-teal"></div>
                </div>
                <div><label class="text-xs font-bold uppercase">Пәні</label><select id="subject" class="input-teal"></select></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-xs font-bold uppercase">Күні</label><input type="date" id="date" class="input-teal"></div>
                    <div><label class="text-xs font-bold uppercase">Мұғалім</label><input id="teacherName" class="input-teal"></div>
                </div>
                <div><label class="text-xs font-bold uppercase">Тақырыбы</label><input id="theme" class="input-teal"></div>
                <div><label class="text-xs font-bold uppercase">Оқу мақсаттары</label><textarea id="objectives" class="input-teal h-20"></textarea></div>
                <div><label class="text-xs font-bold uppercase">Қосымша нұсқау (AI үшін):</label><textarea id="optionalText" class="input-teal h-32"></textarea></div>
                
                <button onclick="generateAI()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition">ҚМЖ Генерациялау</button>
            </div>

            <!-- PREVIEW SIDE -->
            <div class="lg:col-span-2 p-6 bg-slate-50">
                <div class="flex justify-between items-center mb-4 bg-white p-3 rounded-lg shadow-sm border">
                    <h2 class="font-bold text-indigo-900">Алдын ала көру</h2>
                    <div id="actionBtns" class="hidden gap-2">
                        <button onclick="copyContent()" class="bg-indigo-100 px-3 py-1 rounded text-sm font-semibold">Көшіру</button>
                        <button onclick="exportDoc()" class="bg-emerald-500 text-white px-3 py-1 rounded text-sm font-semibold">.doc Жүктеу</button>
                    </div>
                </div>
                <div id="contentPreview" class="bg-white p-8 border border-gray-200 min-h-[600px] overflow-auto">
                    <p class="text-gray-400 text-center mt-20">Жоспар осында пайда болады</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const subjects = ["Қазақ тілі", "Қазақ әдебиеті", "Математика", "Алгебра", "Геометрия", "Информатика", "Физика", "Химия", "Биология", "География", "Дүниежүзі тарихы", "Қазақстан тарихы"];
        
        // Initialize subjects
        const subjSelect = document.getElementById('subject');
        subjects.forEach(s => subjSelect.innerHTML += `<option value="${s}">${s}</option>`);
        lucide.createIcons();

        async function generateAI() {
            const btn = document.getElementById('genBtn');
            const content = document.getElementById('contentPreview');
            const theme = document.getElementById('theme').value;
            const objectives = document.getElementById('objectives').value;

            if(!theme || !objectives) return alert("Тақырып пен мақсатты енгізіңіз!");
            
            btn.innerText = "Генерациялануда...";
            btn.disabled = true;

            const prompt = `Сіз мықты әдіскерсіз. ${theme} тақырыбына ${objectives} оқу мақсатына сай ҚМЖ жасаңыз... (мұнда бұрынғы prompt-ты толық қамтитын логиканы қолдану)`;

            try {
                // Fetch logic similar to React version...
                // Mock result to show structure:
                content.innerHTML = `<h2 class="text-center font-bold text-xl">Қысқа мерзімді жоспар</h2><div class="mt-4">Жоспар генерацияланды...</div>`;
                document.getElementById('actionBtns').classList.remove('hidden');
            } catch(e) { alert("Қате кетті"); }
            finally { btn.innerText = "ҚМЖ Генерациялау"; btn.disabled = false; }
        }

        function exportDoc() {
            const content = document.getElementById('contentPreview').innerHTML;
            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "ҚМЖ_Жоспары.doc";
            a.click();
        }

        function copyContent() {
            const range = document.createRange();
            range.selectNode(document.getElementById('contentPreview'));
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert("Көшірілді!");
        }
    </script>
</body>
</html>
